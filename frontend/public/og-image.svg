<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="50"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <circle cx="120" cy="120" r="200" fill="#ffffff" opacity="0.08" filter="url(#blur)"/>
  <circle cx="1080" cy="510" r="220" fill="#ffffff" opacity="0.10" filter="url(#blur)"/>

  <!-- Envelope icon -->
  <g transform="translate(80,180)">
    <rect x="0" y="0" width="120" height="120" rx="28" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.35" stroke-width="2"/>
    <path d="M30 45 L60 70 L90 45 M30 45 L30 90 L90 90 L90 45" fill="none" stroke="#ffffff" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  </g>

  <!-- Headline -->
  <text x="240" y="245" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">
    Send Bulk Emails Free
  </text>
  <text x="240" y="335" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="72" font-weight="800" fill="#ffffff" opacity="0.85" letter-spacing="-2">
    Using Your Own Gmail
  </text>

  <text x="240" y="395" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="500" fill="#ffffff" opacity="0.85">
    No sign-up · No subscription · Up to 400 emails/day
  </text>

  <!-- Pills -->
  <g transform="translate(80,470)">
    <g>
      <rect x="0" y="0" width="220" height="56" rx="28" fill="#ffffff" opacity="0.18"/>
      <text x="35" y="36" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="600" fill="#ffffff">✓ Personalized {Name}</text>
    </g>
    <g transform="translate(240,0)">
      <rect x="0" y="0" width="180" height="56" rx="28" fill="#ffffff" opacity="0.18"/>
      <text x="32" y="36" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="600" fill="#ffffff">✓ CSV Upload</text>
    </g>
    <g transform="translate(440,0)">
      <rect x="0" y="0" width="200" height="56" rx="28" fill="#ffffff" opacity="0.18"/>
      <text x="32" y="36" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="600" fill="#ffffff">✓ Live Tracking</text>
    </g>
  </g>

  <!-- Domain -->
  <text x="1120" y="600" text-anchor="end" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff" opacity="0.7">
    sendanemail.xyz
  </text>
</svg>
